name: pre-commit

on:
  pull_request:

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync --all-extras
    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1
